<!DOCTYPE html>
<html>
<head>
    <title>Delete Students</title>
</head>
<body>

<h2>Delete All Students</h2>

<a href="/delete-all">
    <button type="button">Delete All</button>
</a>

<hr>

<h2>Delete Selected Students</h2>

<form action="/delete-some" method="post">

{% for student in students %}

    <input
        type="checkbox"
        name="emails"
        value="{{ student.email }}"
    >

    <label>{{ student.email }}</label>

    <br>

{% endfor %}

<br>

<button type="submit">
    Delete Selected
</button>

</form>

</body>
</html>
